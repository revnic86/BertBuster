spring.application.name=BertBuster
spring.datasource.url=jdbc:mysql://localhost:3306/bertbuster
spring.datasource.username=bertbuster
spring.datasource.password=${DB_PASSWORD:default_password}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Pure console app
spring.main.web-application-type=none
spring.main.banner-mode=off

# Force Spring to stop logging startup info to the console
spring.main.log-startup-info=false
spring.ai.mcp.server.stdio=true

# Redirects ALL logs to a file to keep 'stdout' 100% clean for Claude.
logging.file.name=logs/bertbuster.log

# Sets the console pattern to nothing,
logging.pattern.console=
logging.level.root=WARN
logging.level.org.hibernate=ERROR

# Ensures that if the app crashes, the stack trace goes to the log file, not the pipe.
logging.exception-conversion-word=%wEx