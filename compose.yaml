version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bertbuster-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: bertbuster
      MYSQL_USER: bertbuster
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
        # ports:
        #   - "3306:3306"   # commented out for production/EC2


  backend:
    build: .
    container_name: bertbuster-backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bertbuster?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: bertbuster
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      # Optional prod settings
      # SPRING_PROFILES_ACTIVE: prod
      # SERVER_PORT: 8080
      # JAVA_OPTS: "-Xmx512m -Xms256m"   # JVM tuning
    ports:
      - "8080:8080"

volumes:
  mysql_data: